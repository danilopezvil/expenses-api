# Ejecutar con: podman-compose up -d
# Socket de Podman (rootless): /run/user/$(id -u)/podman/podman.sock
# Exportar si alguna herramienta lo necesita:
#   export DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock

services:
  postgres:
    image: postgres:16-alpine
    container_name: expenses-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expenses_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d expenses_dev']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: expenses-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio
    container_name: expenses-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  minio_data:
